<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #fbfaf7;
    color: #191919;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    border: 1px solid #e4e2db;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
  }
  .top { display: flex; align-items: center; gap: 22px; }
  .crest { height: 128px; width: 128px; border-radius: 26px; border: 1px solid #e4e2db; object-fit: contain; }
  .name { font-family: 'Lora', Georgia, serif; font-style: italic; font-weight: 500; font-size: 38px; line-height: 1; }
  .tag { font-size: 21px; color: #19191999; margin-top: 8px; }
  .stat { font-family: 'Lora', Georgia, serif; font-weight: 600; font-size: 150px; line-height: 0.95; letter-spacing: -5px; margin-top: 34px; }
  .sub { font-size: 23px; color: #19191999; margin-top: 10px; }
  .skills { display: flex; gap: 12px; margin-top: 34px; font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #191919b3; }
  .skills span { border: 1px solid #e4e2db; border-radius: 999px; padding: 7px 16px; }
  .repo { position: absolute; bottom: 40px; right: 96px; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: #19191980; }
</style>
</head>
<body>
  <div class="top">
    <img class="crest" src="logo.jpg" alt="paleo">
    <div>
      <div class="name">paleo</div>
      <div class="tag">Token-saving skills for LLM agents.</div>
    </div>
  </div>
  <div class="stat">53.8%</div>
  <div class="sub">median output-token reduction — measured, not claimed.</div>
  <div class="skills">
    <span>paleo</span><span>paleo-trim-context</span><span>paleo-skip-preamble</span><span>paleo-budget</span>
  </div>
  <div class="repo">github.com/mocasus/paleo</div>
</body>
</html>
